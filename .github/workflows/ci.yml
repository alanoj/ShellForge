name: ShellForge CI

on:
    push:
        branches: [main]
    pull_request:
        branches: [main]

jobs:
    build:
        runs-on: ubuntu-latest

        strategy:
            matrix:
                os: [ubuntu-latest, macos-latest]

        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            - name: Setup Python
              uses: actions/setup-python@v5
              with:
                  python-version: "3.12"

            - name: Install dependencies
              run: |
                  python -m pip install --upgrade pip
                  pip install -e .

            - name: Lint
              run: |
                  pip install ruff
                  ruff check .

            - name: Type check
              run: |
                  pip install mypy
                  mypy src/

            - name: CLI smoke test
              run: |
                  shellforge --help
